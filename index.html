<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Digital Clock App</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="alarmOverlay">
        <div id="alarmOverlayMessage" style="font-size:32px;font-weight:bold;margin-bottom:16px;">Alarm is ringing!
        </div>
        <div style="display:flex;gap:16px;">
            <button class="stop-button" onclick="stopAlarm()">Stop</button>
            <button onclick="snoozeCurrentAlarm()">Snooze</button>
        </div>
    </div>

    <div class="menu">
        <button onclick="showSection('home')" class="active">World Clock</button>
        
        <button onclick="showSection('alarm')">Alarm</button>
        <button onclick="showSection('timer')">Timer</button>
        <button onclick="showSection('stopwatch')">Stopwatch</button>
        <button onclick="showSection('weather')">Weather</button>
        <button onclick="showSection('map')">Map</button>
    </div>

    <div class="content">

        <!-- HOME -->
        <div id="home" class="section active">
            <div class="clock-container">
                <h1 id="clock">00:00:00</h1>
                <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 0;">
                    <p id="dateDisplay"></p>
                    <select id="timeZoneSelect" onchange="updateTimeZone()">
                        <option value="local">Local Time</option>
                        <option value="America/New_York">Eastern Time</option>
                        <option value="America/Chicago">Central Time</option>
                        <option value="America/Denver">Mountain Time</option>
                        <option value="America/Los_Angeles">Pacific Time</option>
                        <option value="Europe/London">London</option>
                        <option value="Europe/Paris">Paris</option>
                        <option value="Asia/Tokyo">Tokyo</option>
                        <option value="UTC">UTC</option>
                    </select>
                </div>
                <div class="analog-clock">
                    <div class="numbers" id="clockNumbers"></div>
                    <div class="hand hour-hand" id="hourHand"></div>
                    <div class="hand minute-hand" id="minuteHand"></div>
                    <div class="hand second-hand" id="secondHand"></div>
                </div>
            </div>
        </div>

        <!-- WEATHER -->
        <div id="weather" class="section">
            <div class="container">
                <div class="card">
                    <h2>Weather</h2>
                    <div id="weatherLoading" style="display:none; margin: 10px 0;">Detecting location and loading weather...</div>
                    <div id="weatherError" style="display:none; color: #ff6b6b; margin: 10px 0;"></div>
                    <div id="weatherCurrent" style="display:none; margin: 15px 0;">
                        <div style="text-align: center; font-size: 48px; font-weight: bold;">
                            <span id="weatherTemp">--</span>°C
                        </div>
                        <div style="text-align: center; font-size: 18px; margin: 10px 0;">
                            <span id="weatherDesc">--</span>
                        </div>
                        <div style="text-align: center; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                            <div>💧 <span id="weatherHumidity">--</span>%</div>
                            <div>💨 <span id="weatherWind">--</span> km/h</div>
                        </div>
                        <div style="text-align: center; margin-top: 10px;">
                            📍 <span id="weatherLocation">--</span>
                        </div>
                    </div>
                    <h3 id="forecastTitle" style="display:none;">7-Day Forecast</h3>
                    <div id="weatherForecast" style="display:none; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px;"></div>
                </div>
            </div>
        </div>

        <!-- MAP -->
        <div id="map" class="section">
            <div class="container">
                <div class="card">
                    <h2>Map</h2>
                    <div id="mapLoading" style="display:none; margin: 10px 0;">Detecting location and loading map...</div>
                    <div id="mapError" style="display:none; color: #ff6b6b; margin: 10px 0;"></div>
                    <div id="mapContainer" style="display:none; height: 400px; border-radius: 12px; margin-top: 15px;">
                        <div id="map" style="height: 100%; width: 100%; border-radius: 12px;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="alarm" class="section">
            <div class="container">
                <div class="card">
                    <h2>Alarm</h2>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px;">
                        <button id="showAlarmFormButton" onclick="showAlarmForm()">Add New Alarm</button>
                    </div>
                    <div id="alarmForm" style="display:none; margin-top:10px; text-align:left;">
                        <button id="alarmBackBtn"
                            style="display:none; margin-bottom:8px; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);"
                            onclick="cancelEditAlarm()">Back</button>
                        <label>Label:<br><input type="text" id="alarmLabel" placeholder="Morning Alarm"></label><br>
                        <label>Time:<br><input type="time" id="alarmInput"></label><br>
                        <label>Sound:<br>
                            <select id="alarmSoundChoice">
                                <option value="audio/iPhone-Alarm-Original.mp3">iPhone Alarm</option>
                                <option value="audio/Otlum Peejay Dela Cruz Nagmumura.mp3">Otlum Peejay</option>
                                <option value="audio/Screen Recording.mp3">Screen Recording</option>
                                <option value="audio/TikTok Sound.mp3">TikTok Sound</option>
                                <option
                                    value="audio/🗣️ Enrique Meme Sound Effect (Original and Slowed Version) No Copyright [sDaZSyrlPN4].mp3">
                                    Enrique Meme Sound Effect</option>
                            </select>
                        </label><br>
                        <label>Repeat daily:<input type="checkbox" id="alarmRepeat"></label><br>
                        <div id="weekdayBoxes" style="display:none; gap:4px;">
                            <label><input type="checkbox" value="0">Sun</label>
                            <label><input type="checkbox" value="1">Mon</label>
                            <label><input type="checkbox" value="2">Tue</label>
                            <label><input type="checkbox" value="3">Wed</label>
                            <label><input type="checkbox" value="4">Thu</label>
                            <label><input type="checkbox" value="5">Fri</label>
                            <label><input type="checkbox" value="6">Sat</label>
                        </div>
                        <label>Snooze (minutes):<br><input type="number" id="alarmSnooze" min="0" value="5"></label><br>
                        <button onclick="saveAlarm()" id="alarmSaveBtn">Add Alarm</button>
                        <button onclick="cancelEditAlarm()" id="alarmCancelBtn" style="display:none;">Cancel</button>
                    </div>
                    <ul id="alarmList"></ul>
                    <div id="alarmNotification"
                        style="margin-top:12px; display:none; background:#0ea5e9; color:#000; padding:10px; border-radius:8px; text-align:center;">
                    </div>
                </div>
            </div>
        </div>

        <!-- TIMER -->
        <div id="timer" class="section">
            <div class="container">
                <div class="card">
                    <h2>Timer</h2>
                    <div class="timer-inputs">
                        <input type="number" id="timerHours" placeholder="00" min="0">
                        <span>:</span>
                        <input type="number" id="timerMin" placeholder="00" min="0">
                        <span>:</span>
                        <input type="number" id="timerSec" placeholder="00" min="0">
                    </div>
                    <label>Sound:<br>
                        <select id="timerSoundChoice">
                            <option value="audio/iPhone-Alarm-Original.mp3">iPhone Alarm</option>
                            <option value="audio/Otlum Peejay Dela Cruz Nagmumura.mp3">Otlum Peejay</option>
                            <option value="audio/Screen Recording.mp3">Screen Recording</option>
                            <option value="audio/TikTok Sound.mp3">TikTok Sound</option>
                            <option
                                value="audio/🗣️ Enrique Meme Sound Effect (Original and Slowed Version) No Copyright [sDaZSyrlPN4].mp3">
                                Enrique Meme Sound Effect</option>
                        </select>
                    </label><br>
                    <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                        <button onclick="startTimer()">Start</button>
                        <button class="stop-button" onclick="stopTimer()">Stop</button>
                        <button onclick="restartTimer()">Restart</button>
                    </div>
                    <h3 id="timerDisplay">00:00:00</h3>
                </div>
            </div>
        </div>

        <!-- STOPWATCH -->
        <div id="stopwatch" class="section">
            <div class="container">
                <div class="card">
                    <h2>Stopwatch</h2>
                    <h3 id="swDisplay">00:00:000</h3>
                    <button onclick="startSW()">Start</button>
                    <button class="stop-button" onclick="stopSW()">Stop</button>
                    <button onclick="resetSW()">Reset</button>
                    <button onclick="lapSW()">Lap</button>
                    <ul id="lapList"></ul>
                </div>
            </div>
        </div>

    </div>




    <!-- SOUND -->
    <audio id="alarmSound" src="audio/iPhone-Alarm-Original.mp3"></audio>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="script.js"></script>

</body>

</html>
